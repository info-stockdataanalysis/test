<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - NIFTY + OI Data</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="controls">
  <span>📊 NIFTY 1m + OI Profile (Top) | OI Time Series (Bottom)</span>
  <label>SMA: <input id="smaPeriod" type="number" value="10" min="1" max="500" style="width:60px;"></label>
  <label><input type="checkbox" id="smaToggle" checked> Show</label>
  <button onclick="reloadData()">Refresh Chart</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>
<div class="chart-panel">
  <div class="chart-container">
    <canvas id="topCanvas" width="800" height="400"></canvas>
  </div>
  <div class="chart-container">
    <canvas id="bottomCanvas" width="800" height="200"></canvas>
  </div>
</div>
<div class="info-panel" id="infoPanel">
  <div>⏱️ Time: <span id="infoTime">--:--:--</span></div>
  <div>📈 Price: <span id="infoPrice">--</span></div>
  <div>📊 OI: <span id="infoOI">--</span></div>
  <div>🕯️ OHLC: <span id="infoOHLC">--</span></div>
</div>

<div class="card">
  <h3>📋 Options Chain / Greeks Table</h3>
  <div class="scroll-table">
    <table id="optionsTable">
      <thead id="optionsHeader"></thead>
      <tbody><tr><td colspan="10">Loading table data...</td></tr></tbody>
    </table>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
