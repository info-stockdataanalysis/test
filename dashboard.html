<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dashboard - OI Time Series</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="controls">
  <span>📊 OI Time Series (from Sheet)</span>
  <label>SMA: <input id="smaPeriod" type="number" value="20" min="1" max="500" style="width:60px;"></label>
  <label><input type="checkbox" id="smaToggle" checked> Show</label>
  <label>SMA Color: <input type="color" id="smaColor" value="#b901f5"></label>
  <span>📋 Table rows: <span id="totalRows">0</span></span>
  <button onclick="reloadData()">Refresh</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>
<div class="chart-panel">
  <div class="chart-container">
    <canvas id="oiCanvas" width="800" height="400"></canvas>
  </div>
</div>
<div class="info-panel" id="infoPanel">
  <div>⏱️ Time: <span id="infoTime">--:--:--</span></div>
  <div>📈 OI: <span id="infoOI">--</span></div>
</div>

<div class="card">
  <h3>📋 Options Chain / Greeks Table</h3>
  <div class="scroll-table">
    <table id="optionsTable">
      <thead id="optionsHeader"></thead>
      <tbody><tr><td colspan="10">Loading table data...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
